<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #181819; --surface2: #222224;
    --border: #2e2e30; --accent: #c8f065; --accent-dim: #9ab84a;
    --text: #f0f0ee; --muted: #888884;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  .day-nav { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: var(--sans); font-size: 1.1rem; font-weight: 800; color: var(--accent); padding: 0 1.25rem; display: flex; align-items: center; border-right: 1px solid var(--border); flex-shrink: 0; }
  .nav-days { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; flex: 1; justify-content: flex-start; }
  .nav-days::-webkit-scrollbar { display: none; }

  .day-btn { flex-shrink: 0; padding: 1rem 1.25rem; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--sans); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .day-btn:hover { color: var(--text); }
  .day-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .day-focus { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); display: block; margin-top: 2px; font-weight: 400; }
  .main { padding: 1.5rem; max-width: 900px; }
  .day-header { margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: flex-start; flex-wrap: wrap; gap: 0.75rem; }
  .day-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }

  .exercises { display: flex; flex-direction: column; gap: 12px; }
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.15s; }
  .ex-card-header { display: flex; align-items: stretch; cursor: pointer; }
  .ex-anim-thumb { width: 110px; flex-shrink: 0; background: #111; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
  .ex-anim-thumb svg { width: 110px; height: 90px; }
  .ex-info { flex: 1; padding: 0.75rem 1rem; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
  .ex-name { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
  .ex-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .badge { font-family: var(--mono); font-size: 0.7rem; padding: 2px 8px; border-radius: 100px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge.accent { background: #1e2e08; color: var(--accent); border-color: #3d5a10; }
  .ex-toggle { width: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1rem; background: none; border: none; cursor: pointer; transition: color 0.15s; }
  .ex-toggle:hover { color: var(--text); }
  .ex-body { border-top: 1px solid var(--border); display: none; }
  .ex-body.open { display: block; }
  .ex-sets { padding: 0.75rem 1rem; }
  .sets-label { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 0.6rem; }
  .sets-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .set-num { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); width: 42px; flex-shrink: 0; }
  .weight-input { width: 80px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 0.85rem; padding: 5px 8px; text-align: center; outline: none; transition: border-color 0.15s; }
  .weight-input:focus { border-color: var(--accent); }
  .weight-unit { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
  .reps-done { width: 60px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 0.85rem; padding: 5px 8px; text-align: center; outline: none; transition: border-color 0.15s; }
  .reps-done:focus { border-color: var(--accent); }

  .prev-best { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .prev-best span { color: var(--accent-dim); }
  .ex-note { margin: 0.5rem 1rem 0.75rem; }
  .note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 0.78rem; padding: 6px 10px; resize: none; outline: none; transition: border-color 0.15s; }
  .note-input:focus { border-color: var(--accent); }
  .note-input::placeholder { color: var(--muted); }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: flex-end; }
  .save-btn { background: var(--accent); color: #0e0e0f; border: none; border-radius: 8px; padding: 0.55rem 1.25rem; font-family: var(--sans); font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .save-btn:hover { opacity: 0.85; }
  .toast { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0e0e0f; font-family: var(--mono); font-size: 0.8rem; padding: 0.5rem 1.25rem; border-radius: 100px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
  .spacer { height: 80px; }
  @media (max-width: 500px) { .main { padding: 1rem; } }
</style>

// ─── DATA & STATE ──────────────────────────────────────────────────────
const days = Object.keys(program);
let activeDay = days[0];
let openCards = {};
let state = {};
let history = {};

function loadState() {
  try { const s = localStorage.getItem('loeft_state'); if (s) state = JSON.parse(s); } catch(e) {}
  try { const h = localStorage.getItem('loeft_history'); if (h) history = JSON.parse(h); } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('loeft_state', JSON.stringify(state)); localStorage.setItem('loeft_history', JSON.stringify(history)); } catch(e) {}
}
function getState(day, ei, si) {
  if (!state[day]) state[day] = {};
  if (!state[day][ei]) state[day][ei] = {};
  if (!state[day][ei][si]) state[day][ei][si] = { weight: '', reps: '', done: false };
  return state[day][ei][si];
}
function getPrevBest(day, name) {
  if (!history[day]?.[name]?.length) return null;
  const last = history[day][name][history[day][name].length - 1];
  const weights = (last?.sets || []).map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
  return weights.length ? Math.max(...weights) : null;
}
function getTotalSets() { return program[activeDay].exercises.reduce((a, ex) => a + ex.sets, 0); }
function getDoneSets() {
  let done = 0;
  program[activeDay].exercises.forEach((ex, ei) => { for (let si = 0; si < ex.sets; si++) if (getState(activeDay, ei, si).done) done++; });
  return done;
}
function isExDone(day, ei, sets) { for (let si = 0; si < sets; si++) if (!getState(day, ei, si).done) return false; return true; }

function updateStats() {}

function renderNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  days.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (day === activeDay ? ' active' : '');
    btn.innerHTML = day + '<span class="day-focus">' + program[day].focus + '</span>';
    btn.onclick = () => { activeDay = day; renderAll(); };
    nav.appendChild(btn);
  });
}

function toggleCard(ei) {
  openCards[activeDay] = openCards[activeDay] || {};
  const isOpen = openCards[activeDay][ei];
  openCards[activeDay] = {};
  openCards[activeDay][ei] = !isOpen;
  renderExercises();
}

function renderExercises() {
  const list = document.getElementById('exerciseList');
  const exs = program[activeDay].exercises;
  list.innerHTML = '';
  if (exs.length === 0) {
    const chill = document.createElement('div');
    chill.style.cssText = 'text-align:center; padding: 4rem 1rem; color: var(--muted);';
    chill.innerHTML = '<div style="font-size:3rem; margin-bottom:1rem;">😎</div><div style="font-family:var(--sans); font-size:1.4rem; font-weight:800; color:var(--accent); letter-spacing:-0.02em;">Chill dag</div><div style="font-family:var(--mono); font-size:0.8rem; margin-top:0.5rem;">Hvil dig — du fortjener det</div>';
    list.appendChild(chill);
    return;
  }
  exs.forEach((ex, ei) => {
    const isOpen = !!(openCards[activeDay]?.[ei]);
    const done = isExDone(activeDay, ei, ex.sets);
    const prev = getPrevBest(activeDay, ex.name);

    const card = document.createElement('div');
    card.className = 'ex-card';

    const hdr = document.createElement('div');
    hdr.className = 'ex-card-header';
    hdr.onclick = () => toggleCard(ei);

    const info = document.createElement('div');
    info.className = 'ex-info';
    info.innerHTML = `<div class="ex-name">${ex.name}</div>
      <div class="ex-badges">
        <span class="badge accent">${ex.sets} sæt</span>
        <span class="badge">${ex.reps} reps</span>
        <span class="badge">${ex.muscle}</span>
      </div>`;

    const toggle = document.createElement('button');
    toggle.className = 'ex-toggle';
    toggle.innerHTML = isOpen ? '▲' : '▼';
    toggle.onclick = (e) => { e.stopPropagation(); toggleCard(ei); };

    hdr.appendChild(info);
    hdr.appendChild(toggle);
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'ex-body' + (isOpen ? ' open' : '');

    // Animated SVG thumb in header
    const animThumb = document.createElement('div');
    animThumb.className = 'ex-anim-thumb';
    animThumb.innerHTML = getAnim(ex.name);
    hdr.insertBefore(animThumb, info);

    // Sets
    const setsDiv = document.createElement('div');
    setsDiv.className = 'ex-sets';
    const lbl = document.createElement('div');
    lbl.className = 'sets-label';
    lbl.textContent = 'SÆT  ·  VÆGT (KG)  ·  REPS UDFØRT';
    setsDiv.appendChild(lbl);

    for (let si = 0; si < ex.sets; si++) {
      const s = getState(activeDay, ei, si);
      const row = document.createElement('div');
      row.className = 'sets-row';

      const num = document.createElement('span');
      num.className = 'set-num';
      num.textContent = 'Sæt ' + (si + 1);

      const wIn = document.createElement('input');
      wIn.type = 'number'; wIn.className = 'weight-input';
      wIn.placeholder = prev || '0'; wIn.value = s.weight; wIn.min = 0; wIn.step = 0.5;
      wIn.addEventListener('input', () => { getState(activeDay, ei, si).weight = wIn.value; saveState(); updateStats(); });

      const wLbl = document.createElement('span'); wLbl.className = 'weight-unit'; wLbl.textContent = 'kg';

      const rIn = document.createElement('input');
      rIn.type = 'number'; rIn.className = 'reps-done';
      rIn.placeholder = ex.reps.split('–')[0]; rIn.value = s.reps; rIn.min = 0;
      rIn.addEventListener('input', () => { getState(activeDay, ei, si).reps = rIn.value; saveState(); updateStats(); });

      const rLbl = document.createElement('span'); rLbl.className = 'weight-unit'; rLbl.textContent = 'reps';

      row.appendChild(num); row.appendChild(wIn); row.appendChild(wLbl);
      row.appendChild(rIn); row.appendChild(rLbl);
      setsDiv.appendChild(row);
    }

    if (prev) {
      const pb = document.createElement('div'); pb.className = 'prev-best';
      pb.innerHTML = 'Forrige bedste: <span>' + prev + ' kg</span>';
      setsDiv.appendChild(pb);
    }
    body.appendChild(setsDiv);

    const noteDiv = document.createElement('div'); noteDiv.className = 'ex-note';
    const noteIn = document.createElement('textarea');
    noteIn.className = 'note-input'; noteIn.rows = 1; noteIn.placeholder = 'Note til øvelsen...';
    noteIn.value = state[activeDay]?.[ei]?.note || '';
    noteIn.addEventListener('input', () => {
      if (!state[activeDay]) state[activeDay] = {};
      if (!state[activeDay][ei]) state[activeDay][ei] = {};
      state[activeDay][ei].note = noteIn.value; saveState();
    });
    noteDiv.appendChild(noteIn);
    body.appendChild(noteDiv);

    card.appendChild(body);
    list.appendChild(card);
  });
}

function renderAll() { renderNav(); document.getElementById('dayTitle').textContent = activeDay; renderExercises(); updateStats(); }

function saveWorkout() {
  const day = activeDay;
  if (!history[day]) history[day] = {};
  const date = new Date().toLocaleDateString('da-DK');
  program[day].exercises.forEach((ex, ei) => {
    if (!history[day][ex.name]) history[day][ex.name] = [];
    const sets = [];
    for (let si = 0; si < ex.sets; si++) { const s = getState(day, ei, si); sets.push({ weight: s.weight, reps: s.reps }); }
    history[day][ex.name].push({ date, sets });
    if (history[day][ex.name].length > 10) history[day][ex.name].shift();
  });
  saveState();
  showFireworks();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showFireworks() {
  const overlay = document.getElementById('fw-overlay');
  const canvas = document.getElementById('fw-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  overlay.style.display = 'flex';

  const particles = [];
  const colors = ['#c8f065','#ffffff','#4a9eff','#ff6b6b','#ffd93d','#a8ff78','#ff9ff3'];

  function spawnBurst(x, y) {
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 8 + 2;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 5 + 2,
        gravity: 0.15
      });
    }
  }

  // Multiple bursts
  const bursts = [
    [canvas.width * 0.2, canvas.height * 0.3],
    [canvas.width * 0.8, canvas.height * 0.25],
    [canvas.width * 0.5, canvas.height * 0.2],
    [canvas.width * 0.15, canvas.height * 0.6],
    [canvas.width * 0.85, canvas.height * 0.5],
  ];
  bursts.forEach(([x,y], i) => setTimeout(() => spawnBurst(x, y), i * 180));

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
      p.alpha -= 0.018; p.vx *= 0.99;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    frame++;
    if (frame < 160) requestAnimationFrame(animate);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  animate();

  setTimeout(() => { overlay.style.display = 'none'; }, 3200);
}

loadState();
openCards[activeDay] = { 0: true };
renderAll();
</script>
<div id="fw-overlay" style="display:none; position:fixed; inset:0; z-index:999; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;">
  <canvas id="fw-canvas" style="position:absolute; inset:0;"></canvas>
  <div style="position:relative; z-index:2; text-align:center; animation: pump-in 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;">
    <div style="font-family:'Syne',sans-serif; font-size:clamp(2.5rem,10vw,5rem); font-weight:800; color:#c8f065; letter-spacing:-0.03em; text-shadow: 0 0 40px rgba(200,240,101,0.6);">GREAT</div>
    <div style="font-family:'Syne',sans-serif; font-size:clamp(2.5rem,10vw,5rem); font-weight:800; color:#ffffff; letter-spacing:-0.03em; margin-top:-0.2em;">PUMP</div>
  </div>
</div>
<style>
@keyframes pump-in {
  0% { transform: scale(0.4); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
</style>
